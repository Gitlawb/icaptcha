# fly.toml — icaptcha
#
# iCaptcha — a service-agnostic proof-of-intelligence gate. Issues escalating
# challenges; mints a signed proof when a requester demonstrates it can reason.
#
# Custom domain: https://icaptcha.gitlawb.com
#
# Secrets (set with `fly secrets set`):
#   ICAPTCHA_SECRET       — REQUIRED. Key for sealing challenge tokens (AES-GCM).
#                           MUST be shared across instances (multi-machine).
#   ICAPTCHA_SIGNING_KEY  — REQUIRED. Ed25519 private key (base64 PKCS8 DER) for
#                           signing proofs. Shared across instances.
#                           Mint: bun -e 'import {generateSigningKey} from "./src/proof.ts"; console.log(generateSigningKey())'
#   OPENGATEWAY_API_KEY   — Optional. Enables LLM challenge types (wordproblem,
#                           riddle). Without it, deterministic challenges only.
#   ICAPTCHA_API_KEYS     — Optional comma-separated caller keys. Unset = open.
#
# Policy env (tunable below or via secrets): ICAPTCHA_REQUIRED_LEVEL,
# ICAPTCHA_MAX_ATTEMPTS, ICAPTCHA_MAX_LEVEL, ICAPTCHA_DIFFICULTY_STEP,
# ICAPTCHA_LLM_MIN_LEVEL, ICAPTCHA_TYPES, ICAPTCHA_MODEL (default 'auto').

app = 'icaptcha'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'
  OPENGATEWAY_URL = 'https://opengateway.gitlawb.com'
  ICAPTCHA_MODEL = 'auto'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 2

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 500
    soft_limit = 350

  [[http_service.checks]]
    interval = '15s'
    timeout = '4s'
    grace_period = '8s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

[[metrics]]
  port = 8080
  path = '/metrics'
